name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Python lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas jinja2 click pytest ruff

      - name: Ruff (correctness lint)
        run: ruff check bin radarmeta tests

      - name: Byte-compile all scripts
        run: python -m compileall bin radarmeta tests

      - name: Unit tests
        run: pytest

  nextflow-config:
    name: Nextflow config parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/

      - name: Resolve pipeline config (test profile)
        run: nextflow config -profile test,docker
